name: Scan Saham Terpusat

# Jalan otomatis tiap 15 menit, HANYA di hari kerja (Senin-Jumat) jam
# 09:00-16:15 WIB (= 02:00-09:15 UTC) -- jam bursa buka. Di luar jam itu
# dan pas Sabtu/Minggu, TIDAK jalan sama sekali (hemat menit GitHub
# Actions, dan sesuai keputusan: app pakai data terakhir bursa buka,
# bukan scan terus-terusan di luar jam bursa).
#
# CATATAN: ini belum memperhitungkan tanggal merah/libur nasional di
# hari kerja (butuh kalender resmi BEI) -- kalau kebetulan jalan pas
# libur nasional, paling cuma dapat data yang sama dengan hari
# sebelumnya dari Yahoo Finance (tidak error, cuma 1x run yang
# hasilnya sama saja).
#
# Bisa juga dipicu manual lewat tab "Actions" di GitHub -> pilih
# workflow ini -> "Run workflow" (ini selalu boleh, kapan saja).
on:
  schedule:
    - cron: "*/15 2-8 * * 1-5"
    - cron: "0,15 9 * * 1-5"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Jalankan petugas scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scan_worker.py
